{% extends 'schedule/base.html' %}

{% block title %}{% if form.instance.pk %}Редактировать курс{% else %}Добавить курс{% endif %}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h2>{% if form.instance.pk %}Редактировать курс{% else %}Добавить курс{% endif %}</h2>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary">Сохранить</button>
                            <a href="{% url 'schedule:course_list' %}" class="btn btn-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
