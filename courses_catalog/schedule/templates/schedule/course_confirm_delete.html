{% extends 'schedule/base.html' %}

{% block title %}Удаление курса{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h2>Подтверждение удаления</h2>
                </div>
                <div class="card-body">
                    <p class="lead">Вы уверены, что хотите удалить курс <strong>{{ course.title }}</strong>?</p>
                    <p class="text-danger">Внимание: Это действие удалит связи студентов с этим курсом!</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="mt-3">
                            <button type="submit" class="btn btn-danger">Да, удалить</button>
                            <a href="{% url 'schedule:course_list' %}" class="btn btn-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
