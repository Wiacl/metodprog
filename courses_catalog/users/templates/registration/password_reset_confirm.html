{% extends 'schedule/base.html' %}

{% block title %}Новый пароль{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-warning">
                    <h3 class="mb-0">🔑 Установка нового пароля</h3>
                </div>
                <div class="card-body">
                    {% if validlink %}
                        <form method="post">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label for="new_password1" class="form-label">Новый пароль</label>
                                <input type="password" name="new_password1" id="new_password1" 
                                       class="form-control" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="new_password2" class="form-label">Подтверждение пароля</label>
                                <input type="password" name="new_password2" id="new_password2" 
                                       class="form-control" required>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-warning">
                                    Установить пароль
                                </button>
                            </div>
                        </form>
                    {% else %}
                        <div class="alert alert-danger">
                            Ссылка для сброса пароля недействительна.
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
