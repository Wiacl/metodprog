{% extends 'schedule/base.html' %}

{% block title %}Выход из системы{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">👋 До свидания!</h3>
                </div>
                <div class="card-body text-center">
                    <p class="lead">Вы успешно вышли из системы.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary">
                        Войти снова
                    </a>
                    <a href="{% url 'schedule:teacher_list' %}" class="btn btn-secondary">
                        На главную
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
