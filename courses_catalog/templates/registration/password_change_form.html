{% extends 'schedule/base.html' %}

{% block title %}Смена пароля{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">🔑 Смена пароля</h3>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4">
                        Для безопасности рекомендуется регулярно менять пароль.
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_old_password" class="form-label">Старый пароль</label>
                            <input type="password" name="old_password" id="id_old_password" 
                                   class="form-control" placeholder="Введите текущий пароль" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_new_password1" class="form-label">Новый пароль</label>
                            <input type="password" name="new_password1" id="id_new_password1" 
                                   class="form-control" placeholder="Введите новый пароль" required>
                            <small class="text-muted">Минимум 8 символов</small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_new_password2" class="form-label">Подтверждение пароля</label>
                            <input type="password" name="new_password2" id="id_new_password2" 
                                   class="form-control" placeholder="Повторите новый пароль" required>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                💾 Сменить пароль
                            </button>
                        </div>
                    </form>
                    
                    <hr>
                    
                    <div class="text-center">
                        <a href="{% url 'schedule:teacher_list' %}">← Вернуться на главную</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
