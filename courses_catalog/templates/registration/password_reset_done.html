{% extends 'schedule/base.html' %}

{% block title %}Письмо отправлено{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">📧 Письмо отправлено</h3>
                </div>
                <div class="card-body text-center">
                    <p>Мы отправили инструкцию по восстановлению пароля на ваш email.</p>
                    <p class="text-muted">Проверьте папку 'sent_emails' в корне проекта.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary">
                        Вернуться ко входу
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
